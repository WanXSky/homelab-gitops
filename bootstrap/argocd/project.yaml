apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: production
  namespace: argocd 
spec:
  description: Production Applications 
  sourceRepos:
    - '*'
  destinations:
    - namespace: production 
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
