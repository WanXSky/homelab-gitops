apiVersion: networking.k8s.io/v1 
kind: Ingress 
metadata:
  name: app 
spec:
  ingressClassName: nginx
  rules:
    - host: example.host 
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app 
                port:
                  number: 80
